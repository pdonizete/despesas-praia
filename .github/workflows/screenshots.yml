name: Generate Screenshots

on:
  # Desativado temporariamente - screenshots sendo gerados manualmente
  # workflow_dispatch:
  # push:
  #   branches: [main, master]
  #   paths:
  #     - 'lib/**'
  #     - 'test/screenshot_test.dart'
  #     - '.github/workflows/screenshots.yml'

jobs:
  screenshots:
    runs-on: ubuntu-latest
    if: false  # Workflow desativado

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup test environment
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-liberation fontconfig
          mkdir -p screenshots

      - name: Run Golden Tests
        run: |
          flutter test test/screenshot_test.dart --update-goldens

      - name: Collect screenshots
        run: |
          cp /tmp/screenshots/*.png screenshots/ 2>/dev/null || true
          find . -name "*.png" -path "*/test/*" -exec cp {} screenshots/ \; 2>/dev/null || true
          ls -la screenshots/

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/*.png
          if-no-files-found: warn
